<!DOCTYPE html>
<html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title> Slider Cards </title>
     <link rel="stylesheet" href="style.css">
 </head>
<body>
  <div class="banner">

          <div class="item" style="--position: 4"><img src="./images/Tanjiro.jpg" alt="Tanjiro"></div>
          <div class="item" style="--position: 5"><img src="./images/Yorichi.jpg" alt="Yorichi"></div>
          <div class="item" style="--position: 6"><img src="./images/Muichiro.jpg" alt="Muichiro"></div>
          <div class="item" style="--position: 7"><img src="./images/Shinobu.jpg" alt="Shinobu"></div>
          <div class="item" style="--position: 8"><img src="./images/Nezuko.jpg" alt="Nezuko"></div>
          <div class="item" style="--position: 9"><img src="./images/Zenitsu.jpg" alt="Zenitsu"></div>
          <div class="item" style="--position: 10"><img src="./images/Giyu.jpg" alt="Giyu"></div>
      </div>
      <div class="content">
          <div class="model"></div>
      </div>
  </div>
</body>
</html>
